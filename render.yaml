# Render Blueprint — deploys this repo as one Docker web service.
# Render serves BOTH the API (/ws, /upload) and the frontend (/, app.js, …)
# from the same HTTPS URL, because FastAPI serves frontend/ as static files.
#
# Use it: push this repo to GitHub, then in Render click "New +" → "Blueprint"
# and pick the repo. Render reads this file. Set the two secret values (marked
# sync: false) in the dashboard when prompted.
services:
  - type: web
    name: ai-voice-presenter
    runtime: docker
    plan: starter            # "free" also works but sleeps after 15 min idle
    healthCheckPath: /
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: AZURE_OPENAI_DEPLOYMENT_NAME
        value: gpt-realtime
      - key: AZURE_OPENAI_API_VERSION
        value: 2025-04-01-preview
      - key: REALTIME_VOICE
        value: alloy
      - key: AZURE_OPENAI_ENDPOINT
        sync: false          # set in the dashboard
      - key: AZURE_OPENAI_API_KEY
        sync: false          # set in the dashboard (secret)
