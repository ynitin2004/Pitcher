<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pitcher logo">
  <defs>
    <linearGradient id="tile" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="sheen" x1="10" y1="6" x2="32" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- rounded tile -->
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#tile)"/>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#sheen)"/>
  <rect x="4.75" y="4.75" width="54.5" height="54.5" rx="15.25" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- play triangle (present) -->
  <path d="M25 21.5 L25 42.5 L42 32 Z" fill="#ffffff"/>

  <!-- sound waves (voice) -->
  <path d="M46 26.5 a8 8 0 0 1 0 11" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M50.5 22 a14 14 0 0 1 0 20" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.65"/>
</svg>
