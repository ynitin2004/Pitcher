<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pitcher logo">
  <defs>
    <linearGradient id="tile" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b93ff"/>
      <stop offset="0.52" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="sheen" x1="12" y1="6" x2="34" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar" x1="32" y1="12" x2="32" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7ecff"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- rounded tile -->
  <rect x="4" y="4" width="56" height="56" rx="17" fill="url(#tile)"/>
  <rect x="4" y="4" width="56" height="56" rx="17" fill="url(#sheen)"/>
  <rect x="4.75" y="4.75" width="54.5" height="54.5" rx="16.25" stroke="#ffffff" stroke-opacity="0.20" stroke-width="1.5"/>

  <!-- voice waveform: five rounded bars, symmetric -->
  <g fill="url(#bar)" filter="url(#soft)">
    <rect x="13.5" y="26" width="5" height="12" rx="2.5"/>
    <rect x="21.25" y="20" width="5" height="24" rx="2.5"/>
    <rect x="29.5" y="15" width="5" height="34" rx="2.5"/>
    <rect x="37.75" y="20" width="5" height="24" rx="2.5"/>
    <rect x="45.5" y="26" width="5" height="12" rx="2.5"/>
  </g>
</svg>
